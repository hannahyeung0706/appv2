<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD Group Search</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </div>
            <h1>
                <i class="fas fa-network-wired"></i>
                Active Directory Search
            </h1>
            <p>Enter your domain credentials to access AD</p>
        </div>
        
        <div class="content">
            <!-- Login Form -->
            <div id="loginForm" class="login-container">
                <div class="login-header">
                    <i class="fas fa-user-circle"></i>
                    <h2>Domain Login</h2>
                    <p>Enter your domain username and password</p>
                </div>
                
                <div class="login-field">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="e.g., johndoe or johndoe@bd.net">
                </div>
                
                <div class="login-field">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Enter your domain password">
                </div>
                
                <button class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                
                <div class="login-info" id="loginInfo">
                    <i class="fas fa-info-circle"></i>
                    <span id="loginMessage"></span>
                </div>
            </div>
            
            <!-- Main Content (hidden until login) -->
            <div id="mainContent" class="main-content">
                <div class="user-info-bar" id="userInfoBar">
                    <span><i class="fas fa-user"></i> <span id="displayName"></span> (<span id="userRole"></span>)</span>
                    <button class="logout-btn" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
                
                <div class="status-fashion" id="status"></div>
                
                <!-- Search Section -->
                <div class="form-group-fashion">
                    <label><i class="fas fa-users"></i> Group Name</label>
                    <input type="text" id="groupName" placeholder="e.g., Domain Users, IT Admins">
                </div>
                
                <div class="form-group-fashion">
                    <label><i class="fas fa-list"></i> Attributes to Retrieve</label>
                    <input type="text" id="attributes" value="displayName,mail,sAMAccountName,department,title" placeholder="displayName,mail,sAMAccountName">
                </div>
                
                <div class="button-group">
                    <button class="btn-fashion btn-primary-fashion" id="searchBtn">
                        <i class="fas fa-search"></i> Search Group
                    </button>
                    <button class="btn-fashion btn-success-fashion" id="exportCsvBtn" disabled>
                        <i class="fas fa-file-csv"></i> Export CSV
                    </button>
                </div>

                <!-- Add after the search button group -->
                <div class="pagination-container" style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0; padding: 10px; background: var(--bg-tertiary); border-radius: 8px; display: none;" id="paginationContainer">
                    <div>
                        <label><i class="fas fa-list"></i> Records per page:</label>
                        <select id="pageSizeSelect" style="margin-left: 10px; padding: 5px; border-radius: 4px;">
                            <option value="50">50</option>
                            <option value="100">100</option>
                            <option value="200" selected>200</option>
                            <option value="500">500</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <button class="pagination-btn" id="firstPageBtn" disabled><i class="fas fa-angle-double-left"></i></button>
                        <button class="pagination-btn" id="prevPageBtn" disabled><i class="fas fa-angle-left"></i></button>
                        <span id="pageInfo">Page 1 of 1</span>
                        <button class="pagination-btn" id="nextPageBtn" disabled><i class="fas fa-angle-right"></i></button>
                        <button class="pagination-btn" id="lastPageBtn" disabled><i class="fas fa-angle-double-right"></i></button>
                    </div>
                </div>

                <!-- Results -->
                <div class="output-container-fashion">
                    <div class="output-header-fashion">
                        <h3><i class="fas fa-users"></i> Group Members</h3>
                        <div class="tabs-fashion">
                            <button class="tab-fashion active" id="tableTab">Table</button>
                            <button class="tab-fashion" id="jsonTab">JSON</button>
                        </div>
                    </div>

                <!-- Results Table - Fixed Structure -->
                <div id="tableView">
                    <div class="table-responsive" style="overflow-x: auto; margin-top: 15px;">
                        <table class="results-table" id="resultsTable" style="width: 100%; border-collapse: collapse; font-size: 13px;">
                            <thead id="tableHeader">
                                <tr style="background: var(--primary-gradient); color: white;">
                                    <th style="padding: 10px;">#</th>
                                    <th style="padding: 10px;">SAM Account</th>  <!-- New first data column -->
                                    <th style="padding: 10px;">Name</th>
                                    <th style="padding: 10px;">Surname</th>
                                    <th style="padding: 10px;">Display Name</th>
                                    <th style="padding: 10px;">Email</th>
                                    <th style="padding: 10px;">Title</th>
                                    <th style="padding: 10px;">Telephone</th>
                                    <th style="padding: 10px;">Pager</th>
                                    <th style="padding: 10px;">Status</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" style="background-color: var(--bg-primary);">
                                <!-- Content will be inserted here -->
                            </tbody>
                        </table>
                    </div>
                </div>  
                
                    <pre class="output-preview-fashion" id="jsonView" style="display: none;"></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                html.removeAttribute('data-theme');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
            } else {
                html.setAttribute('data-theme', 'dark');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
        });

        // DOM elements
        const loginForm = document.getElementById('loginForm');
        const mainContent = document.getElementById('mainContent');
        const username = document.getElementById('username');
        const password = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loginInfo = document.getElementById('loginInfo');
        const loginMessage = document.getElementById('loginMessage');
        const displayName = document.getElementById('displayName');
        const userRole = document.getElementById('userRole');
        const logoutBtn = document.getElementById('logoutBtn');
        const groupName = document.getElementById('groupName');
        const attributes = document.getElementById('attributes');
        const searchBtn = document.getElementById('searchBtn');
        const exportCsvBtn = document.getElementById('exportCsvBtn');
        const status = document.getElementById('status');
        const tableBody = document.getElementById('tableBody');
        const jsonView = document.getElementById('jsonView');
        const tableTab = document.getElementById('tableTab');
        const jsonTab = document.getElementById('jsonTab');
        const paginationContainer = document.getElementById('paginationContainer');
        const pageSizeSelect = document.getElementById('pageSizeSelect');
        const firstPageBtn = document.getElementById('firstPageBtn');
        const prevPageBtn = document.getElementById('prevPageBtn');
        const nextPageBtn = document.getElementById('nextPageBtn');
        const lastPageBtn = document.getElementById('lastPageBtn');
        const pageInfo = document.getElementById('pageInfo');

        let currentPage = 1;
        let totalPages = 1;
        let currentGroupName = '';
        let currentAttributes = '';
        let sessionToken = null;
        let currentResults = null;
        
        // Check for saved session
        const savedToken = sessionStorage.getItem('adSessionToken');
        if (savedToken) {
            validateSession(savedToken);
        }
        
        // Login
        loginBtn.addEventListener('click', async () => {
            if (!username.value.trim() || !password.value.trim()) {
                showLoginMessage('Please enter username and password', 'error');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            
            try {
                const response = await fetch('/api/ad/authenticate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username.value.trim(),
                        password: password.value.trim()
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    sessionToken = data.sessionToken;
                    sessionStorage.setItem('adSessionToken', sessionToken);
                    
                    displayName.textContent = data.user.displayName || data.user.username;
                    userRole.textContent = data.user.role || 'user';
                    
                    loginForm.style.display = 'none';
                    mainContent.style.display = 'block';
                    
                    showStatus('✅ Login successful', 'success');
                } else {
                    showLoginMessage(data.error || 'Login failed', 'error');
                }
            } catch (error) {
                showLoginMessage('Connection error', 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });
        
        // Validate session
        async function validateSession(token) {
            try {
                const response = await fetch(`/api/ad/user-info?sessionToken=${token}`);
                const data = await response.json();
                
                if (data.success) {
                    sessionToken = token;
                    displayName.textContent = data.user.displayName || data.user.username;
                    userRole.textContent = data.user.role || 'user';
                    
                    loginForm.style.display = 'none';
                    mainContent.style.display = 'block';
                } else {
                    sessionStorage.removeItem('adSessionToken');
                }
            } catch (error) {
                sessionStorage.removeItem('adSessionToken');
            }
        }
        
        // Logout
        logoutBtn.addEventListener('click', async () => {
            if (sessionToken) {
                await fetch('/api/ad/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionToken })
                });
            }
            
            sessionToken = null;
            sessionStorage.removeItem('adSessionToken');
            loginForm.style.display = 'block';
            mainContent.style.display = 'none';
            username.value = '';
            password.value = '';
        });
        
        // Search group
        searchBtn.addEventListener('click', async () => {
        if (!groupName.value.trim()) {
            showStatus('❌ Please enter a group name', 'error');
            return;
        }
        
        searchBtn.disabled = true;
        searchBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Searching...';
        
        const pageSize = parseInt(pageSizeSelect.value);
        currentPage = 1;
        currentGroupName = groupName.value.trim();
        currentAttributes = attributes.value || 'displayName,mail,sn,title,telephoneNumber,pager,sAMAccountName';
        
        try {
            // Always use recursive endpoint
            const endpoint = '/api/ad/search-group-recursive';
            
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sessionToken: sessionToken,
                    groupName: currentGroupName,
                    attributes: currentAttributes,
                    page: currentPage,
                    pageSize: pageSize
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                currentResults = data;
                displayResults(data);
                exportCsvBtn.disabled = false;
                
                // Update pagination
                totalPages = data.totalPages || 1;
                updatePaginationControls(data);
                
                showStatus(`✅ Found ${data.totalUsers} users (including nested groups)`, 'success');
            } else {
                showStatus('❌ ' + (data.error || 'Search failed'), 'error');
            }
        } catch (error) {
            showStatus('❌ Search failed: ' + error.message, 'error');
        } finally {
            searchBtn.disabled = false;
            searchBtn.innerHTML = '<i class="fas fa-search"></i> Search Group';
        }
    });


        // Perform search with pagination
        async function performSearch(page, pageSize) {
            const response = await fetch('/api/ad/search-group-recursive', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sessionToken: sessionToken,
                    groupName: currentGroupName,
                    attributes: currentAttributes,
                    page: page,
                    pageSize: pageSize
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                currentResults = data;
                displayResults(data);
                exportCsvBtn.disabled = false;
                
                totalPages = data.totalPages || 1;
                updatePaginationControls(data);
            } else {
                showStatus('❌ ' + (data.error || 'Search failed'), 'error');
            }
        }

        // Update pagination controls
        function updatePaginationControls(data) {
            if (data.totalPages > 1) {
                paginationContainer.style.display = 'flex';
                pageInfo.textContent = `Page ${data.currentPage} of ${data.totalPages}`;
                
                // Enable/disable buttons
                firstPageBtn.disabled = data.currentPage === 1;
                prevPageBtn.disabled = data.currentPage === 1;
                nextPageBtn.disabled = data.currentPage === data.totalPages;
                lastPageBtn.disabled = data.currentPage === data.totalPages;
            } else {
                paginationContainer.style.display = 'none';
            }
        }

        // Pagination event handlers
        firstPageBtn.addEventListener('click', async () => {
            if (currentPage === 1) return;
            currentPage = 1;
            await performSearch(currentPage, parseInt(pageSizeSelect.value), true);
        });

        prevPageBtn.addEventListener('click', async () => {
            if (currentPage <= 1) return;
            currentPage--;
            await performSearch(currentPage, parseInt(pageSizeSelect.value), true);
        });

        nextPageBtn.addEventListener('click', async () => {
            if (currentPage >= totalPages) return;
            currentPage++;
            await performSearch(currentPage, parseInt(pageSizeSelect.value), true);
        });

        lastPageBtn.addEventListener('click', async () => {
            if (currentPage === totalPages) return;
            currentPage = totalPages;
            await performSearch(currentPage, parseInt(pageSizeSelect.value), true);
        });

        pageSizeSelect.addEventListener('change', async () => {
            if (currentGroupName) {
                currentPage = 1;
                await performSearch(currentPage, parseInt(pageSizeSelect.value), true);
            }
        });

    // Display results with proper table structure

    function displayResults(data) {
    if (!data.users || data.users.length === 0) {
        tableBody.innerHTML = `
            <tr>
                <td colspan="10" style="text-align: center; padding: 30px;">
                    <i class="fas fa-users" style="font-size: 24px; margin-bottom: 10px; display: block;"></i>
                    No users found
                </td>
            </tr>
        `;
        jsonView.textContent = JSON.stringify(data, null, 2);
        return;
    }
    
    // Show count information above table
    const countInfo = document.createElement('div');
    countInfo.className = 'count-info';
    countInfo.style.cssText = `
        margin-bottom: 15px; 
        padding: 12px 15px; 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
        color: white; 
        border-radius: 8px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        flex-wrap: wrap; 
        gap: 10px;
        font-size: 13px;
    `;
    
    countInfo.innerHTML = `
        <span><i class="fas fa-users"></i> <strong>Total Users:</strong> ${data.totalUsers}</span>
        <span><i class="fas fa-eye"></i> <strong>Showing:</strong> ${data.startIndex || 1}-${data.endIndex || data.users.length}</span>
        ${data.stats ? `
            <span><i class="fas fa-phone"></i> <strong>With Telephone:</strong> ${data.stats.withTelephone}</span>
            <span><i class="fas fa-pager"></i> <strong>With Pager:</strong> ${data.stats.withPager}</span>
        ` : ''}
        <span><i class="fas fa-tag"></i> <strong>Method:</strong> ${data.method || 'Standard'}</span>
    `;
    
    // Insert count info before table
    const tableView = document.getElementById('tableView');
    const existingCountInfo = tableView.querySelector('.count-info');
    if (existingCountInfo) {
        existingCountInfo.remove();
    }
    tableView.insertBefore(countInfo, tableView.firstChild);
    
    // Build table rows
    let rows = '';
    data.users.forEach((user, index) => {
        const rowNumber = data.startIndex ? data.startIndex + index : index + 1;
        
        // Handle null/undefined values
        const name = user.sAMAccountName || '-';
        const sn = user.sn || '-';
        const displayName = user.displayName || '-';
        const email = user.mail || '-';
        const title = user.title || '-';
        const telephone = user.telephoneNumber || '-';
        const pager = user.pager || '-';
        const enabled = user.enabled === true || user.enabled === 'true';
        
        // Alternate row background
        const bgColor = index % 2 === 0 ? 'var(--bg-primary)' : 'var(--bg-tertiary)';
        
        rows += `
            <tr style="border-bottom: 1px solid var(--border-color); background-color: ${bgColor};">
                <td style="padding: 10px 8px; font-weight: 600; color: var(--accent-1); text-align: center;">${rowNumber}</td>
                <td style="padding: 10px 8px; font-weight: 600; color: var(--accent-1);" title="${user.sAMAccountName || ''}">${truncateText(user.sAMAccountName || '-', 15)}</td>
                <td style="padding: 10px 8px;" title="${user.name || ''}">${truncateText(user.name || '-', 15)}</td>
                <td style="padding: 10px 8px;" title="${sn}">${escapeHtml(sn)}</td>
                <td style="padding: 10px 8px;" title="${displayName}">${escapeHtml(displayName)}</td>
                <td style="padding: 10px 8px;" title="${email}">${escapeHtml(email)}</td>
                <td style="padding: 10px 8px;" title="${title}">${escapeHtml(title)}</td>
                <td style="padding: 10px 8px;" title="${telephone}">${escapeHtml(telephone)}</td>
                <td style="padding: 10px 8px;" title="${pager}">${escapeHtml(pager)}</td>
                <td style="padding: 10px 8px;">
                    ${enabled ? 
                        '<span style="display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; background-color: #10b981; color: white; border-radius: 20px; font-size: 11px; font-weight: 600;"><i class="fas fa-check-circle" style="font-size: 10px;"></i> Enabled</span>' : 
                        '<span style="display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; background-color: #ef4444; color: white; border-radius: 20px; font-size: 11px; font-weight: 600;"><i class="fas fa-times-circle" style="font-size: 10px;"></i> Disabled</span>'}
                </td>
            </tr>
        `;
    });
    
    tableBody.innerHTML = rows;
    jsonView.textContent = JSON.stringify(data, null, 2);
}

// Helper function to escape HTML special characters
function escapeHtml(text) {
    if (!text) return '-';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Helper function to truncate long text
function truncateText(text, maxLength) {
    if (!text || text.length <= maxLength) return text;
    return text.substring(0, maxLength) + '...';
}

// Add tooltip functionality for truncated text
document.addEventListener('mouseover', function(e) {
    const target = e.target;
    if (target.tagName === 'TD' && target.title) {
        // Title attribute already shows full text on hover
    }
});
        
        // Export CSV
       // Export ALL records to CSV (not just current page)
    exportCsvBtn.addEventListener('click', async () => {
        if (!currentResults || !currentResults.totalUsers || currentResults.totalUsers === 0) {
            showStatus('❌ No data to export', 'error');
            return;
        }
        
        // Show loading state
        exportCsvBtn.disabled = true;
        const originalText = exportCsvBtn.innerHTML;
        exportCsvBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Exporting all records...';
        
        try {
            // Get all users from the server (by requesting a large page size)
            const recursive = document.getElementById('recursiveSearch')?.checked ?? true;
            const endpoint = recursive ? '/api/ad/search-group-recursive' : '/api/ad/search-group';
            
            // Request all records at once by setting pageSize to a large number
            // (or you could implement a separate export endpoint)
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sessionToken: sessionToken,
                    groupName: currentGroupName,
                    attributes: attributes.value || 'displayName,mail,sn,title,telephoneNumber,pager,sAMAccountName',
                    page: 1,
                    pageSize: 10000  // Request a large number to get all records
                })
            });
            
            const data = await response.json();
            
            if (data.success && data.users && data.users.length > 0) {
                // Generate CSV with ALL users
                generateCSV(data.users, currentGroupName);
                showStatus(`✅ Exported ${data.users.length} records to CSV`, 'success');
            } else {
                showStatus('❌ No data to export', 'error');
            }
        } catch (error) {
            console.error('Export error:', error);
            showStatus('❌ Export failed: ' + error.message, 'error');
        } finally {
            // Restore button state
            exportCsvBtn.disabled = false;
            exportCsvBtn.innerHTML = originalText;
        }
    });

    // Helper function to generate CSV from user data
    function generateCSV(users, groupName) {
        // Define CSV headers
        const headers = ['SAM Account', 'Name', 'Surname', 'Display Name', 'Email', 'Title', 'Telephone', 'Pager', 'Status'];
        const csvRows = [headers.join(',')];

        // Add each user as a row
        users.forEach(user => {
            const row = [
                user.sAMAccountName || '',
                user.name || '',
                user.sn || '',
                user.displayName || '',
                user.mail || '',
                user.title || '',
                user.telephoneNumber || '',
                user.pager || '',
                user.enabled ? 'Enabled' : 'Disabled'
            ];
        
        // Escape fields that contain commas or quotes
        const escapedRow = row.map(field => {
            if (typeof field === 'string') {
                // If field contains comma, newline, or double quote, wrap in quotes and escape quotes
                if (field.includes(',') || field.includes('\n') || field.includes('"')) {
                    return `"${field.replace(/"/g, '""')}"`;
                }
            }
            return field;
        });
        
        csvRows.push(escapedRow.join(','));
    });
    
        // Create and download CSV file
        const csvContent = csvRows.join('\n');
        const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' }); // Add BOM for UTF-8
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${groupName.replace(/[^a-z0-9]/gi, '_')}_all_members_${new Date().toISOString().slice(0,10)}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
    }
        
        // Tab switching
        tableTab.addEventListener('click', () => {
            tableTab.classList.add('active');
            jsonTab.classList.remove('active');
            document.getElementById('tableView').style.display = 'block';
            jsonView.style.display = 'none';
        });
        
        jsonTab.addEventListener('click', () => {
            jsonTab.classList.add('active');
            tableTab.classList.remove('active');
            document.getElementById('tableView').style.display = 'none';
            jsonView.style.display = 'block';
        });
        
        // Helper functions
        function showLoginMessage(msg, type) {
            loginInfo.style.display = 'block';
            loginMessage.textContent = msg;
            loginInfo.className = 'login-info ' + type;
        }
        
        function showStatus(msg, type) {
            status.textContent = msg;
            status.className = 'status-fashion ' + type;
            status.style.display = 'block';
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }
        
        // Enter key
        password.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
        
        groupName.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchBtn.click();
        });
    </script>
</body>
</html>
